name: Binance Data Download

# 触发条件
on:
  # 每天 UTC 时间 00:00 执行 (北京时间 08:00)
  schedule:
    - cron: '0 0 * * *'

  # 手动触发
  workflow_dispatch:

  # 推送到主分支时触发
  push:
    branches:
      - main
    paths:
      - 'binance_data_downloader.py'
      - '.github/workflows/binance-data-download.yml'

jobs:
  download-data:
    runs-on: ubuntu-latest

    steps:
      # 检出代码
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 设置 Python 环境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 创建 requirements.txt (如果不存在)
      - name: Create requirements file if needed
        run: |
          if [ ! -f requirements.txt ]; then
            echo "ccxt>=4.0" > requirements.txt
            echo "pandas>=2.0" >> requirements.txt
          fi

      # 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 运行数据下载脚本
      - name: Run Binance data downloader
        run: python binance_data_downloader.py
        timeout-minutes: 60

      # 提交和推送数据 (可选)
      - name: Commit downloaded data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 只添加数据文件，不添加日志
          git add data/*.csv data/*.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update binance data $(date -u +'%Y-%m-%d %H:%M:%S')"
            git push
          fi

      # 上传工件以便查看日志
      - name: Upload download logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: binance-download-logs-${{ github.run_id }}
          path: data/download.log
          retention-days: 30

      # 失败通知 (可选，需配置)
      - name: Notify on failure
        if: failure()
        run: |
          echo "⚠️ Binance data download failed!"
          echo "Check the workflow logs for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
